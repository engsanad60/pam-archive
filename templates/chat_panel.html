<style>
  .cp-panel{position:fixed;right:0;top:0;height:100vh;width:420px;background:var(--card,#fff);border-left:1px solid var(--border,#e5e7eb);box-shadow:-6px 0 28px rgba(0,0,0,.16);transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:1100;display:flex;flex-direction:column}
  .cp-panel.open{transform:translateX(0)}
  .cp-tab{position:fixed;right:0;top:50%;transform:translateY(-50%);background:#1e3a5f;color:#c9a84c;padding:52px 9px;border-radius:12px 0 0 12px;cursor:pointer;z-index:1099;writing-mode:vertical-rl;font-family:"Cairo",sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;box-shadow:-4px 0 14px rgba(0,0,0,.18);transition:background .2s;user-select:none}
  .cp-tab:hover{background:#294c78}
  .cp-head{padding:12px 16px;background:#1e3a5f;color:#fff;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;border-radius:0}
  .cp-head-info h3{margin:0;font-size:15px;display:flex;align-items:center;gap:6px}
  .cp-head-sub{font-size:11px;color:rgba(255,255,255,.65);margin-top:2px}
  .cp-online{width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block}
  .cp-close{background:transparent;border:none;color:#fff;font-size:22px;cursor:pointer;line-height:1;padding:0}
  .cp-sugs{padding:8px 12px;border-bottom:1px solid var(--border,#e5e7eb);display:flex;flex-wrap:wrap;gap:6px;flex-shrink:0;background:rgba(30,58,95,.03)}
  .cp-sug{border:1px solid var(--border,#e5e7eb);background:transparent;color:var(--text,#1f2937);padding:5px 10px;border-radius:999px;font-size:12px;cursor:pointer;font-family:"Cairo",sans-serif;transition:all .15s}
  .cp-sug:hover{background:rgba(30,58,95,.08);border-color:#1e3a5f}
  .cp-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
  .cp-msg{max-width:88%;padding:9px 12px;border-radius:12px;font-size:14px;line-height:1.65;border:1px solid var(--border,#e5e7eb)}
  .cp-user{align-self:flex-end;background:#1e3a5f;color:#fff;border-color:transparent;white-space:pre-wrap}
  .cp-bot{align-self:flex-start;background:var(--card,#fff);color:var(--text,#1f2937);padding:10px 14px}
  .cp-bot br+br{display:block;margin:4px 0;content:""}
  .cp-bot p{margin:2px 0}
  .cp-bot br{line-height:1.2}
  .cp-bot table{margin:4px 0}
  .cp-bot h2,.cp-bot h3,.cp-bot h4{margin:4px 0}
  .cp-viol{background:#fee2e2;color:#991b1b;border-color:#fecaca}
  .cp-src{font-size:12px;color:#8d6f1f;background:rgba(201,168,76,.15);border:1px solid var(--border,#e5e7eb);padding:3px 8px;border-radius:999px;display:inline-flex;margin-top:5px}
  /* Source cards (shared styles also in chat_widget but re-declared for isolation) */
  .src-cards{margin-top:10px;display:flex;flex-direction:column;gap:8px}
  .src-cards-label{font-family:'Cairo',sans-serif;font-size:11px;color:#718096;margin-bottom:2px;text-align:right}
  .src-card{position:relative;background:linear-gradient(135deg,#f0f4ff,#e8f0fe);border:1px solid #c3d4f7;border-right:4px solid #1a2f4e;border-radius:10px;padding:10px 14px;cursor:pointer;transition:all 0.2s ease;display:block}
  .src-card:hover{background:linear-gradient(135deg,#e0e8ff,#d0e0fc);transform:translateY(-1px);box-shadow:0 4px 12px rgba(26,47,78,.15);border-right-color:#c9a84c}
  .src-card::after{content:attr(data-tooltip);position:absolute;bottom:calc(100% + 6px);right:50%;transform:translateX(50%);background:#1a2f4e;color:#fff;padding:4px 10px;border-radius:6px;font-size:11px;font-family:'Cairo',sans-serif;white-space:nowrap;opacity:0;transition:opacity 0.2s;pointer-events:none;z-index:10}
  .src-card:hover::after{opacity:1}
  .src-card-inner{display:flex;align-items:center;gap:10px;direction:rtl}
  .src-card-icon{font-size:22px;flex-shrink:0}
  .src-card-info{flex:1;text-align:right;min-width:0}
  .src-card-name{font-family:'Cairo',sans-serif;font-weight:700;font-size:12px;color:#1a2f4e;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .src-card-meta{font-family:'Cairo',sans-serif;font-size:10px;color:#4a5568}
  .src-card-arrow{font-size:14px;color:#c9a84c;flex-shrink:0}
  [dir="ltr"] .src-card-inner{direction:ltr}
  [dir="ltr"] .src-card-info{text-align:left}
  .cp-typing-wrap{display:inline-flex;gap:4px}
  .cp-typing-wrap i{width:6px;height:6px;border-radius:50%;background:#6b7280;animation:cpDot 1s infinite}
  .cp-typing-wrap i:nth-child(2){animation-delay:.15s}.cp-typing-wrap i:nth-child(3){animation-delay:.3s}
  @keyframes cpDot{0%,80%,100%{transform:scale(.8)}40%{transform:scale(1)}}
  .cp-foot{padding:10px 12px;border-top:1px solid var(--border,#e5e7eb);display:flex;gap:8px;flex-shrink:0;background:var(--card,#fff)}
  .cp-input{flex:1;border:1px solid var(--border,#e5e7eb);border-radius:10px;padding:10px 12px;background:transparent;color:var(--text,#1f2937);font-family:"Cairo",sans-serif;font-size:14px}
  .cp-send{background:#1e3a5f;color:#fff;border:none;border-radius:10px;padding:10px 16px;cursor:pointer;font-family:"Cairo",sans-serif;font-size:14px}
  @media(max-width:768px){
    .cp-panel{width:100vw!important;height:100vh!important;top:0!important}
    .cp-tab{padding:38px 8px;font-size:12px}
    .cp-input{font-size:16px!important}
    .cp-send{padding:12px 16px!important}
    .cp-msg{max-width:90%!important;font-size:14px!important}
    .src-card{padding:8px!important}
    .src-card-name{font-size:12px!important;max-width:180px!important}
    table{display:block!important;overflow-x:auto!important;white-space:nowrap!important}
  }
</style>

<div id="cpPanel" class="cp-panel" role="complementary" aria-label="المساعد الذكي">
  <div class="cp-head">
    <div style="display:flex;align-items:center;gap:10px">
      <img src="/static/images/pam-logo.png" onerror="this.onerror=null;this.src='/static/images/pam-logo.png' onerror="this.onerror=null;this.src='https://www.manpower.gov.kw/ImageProxy.ashx?path=/Images/Picture6.png'""
           alt="PAM" style="height:40px;width:auto;object-fit:contain;flex-shrink:0;filter:brightness(1.2)"
           onerror="this.onerror=null;this.outerHTML='<div style=\'width:34px;height:34px;background:#c9a84c;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#1a2f4e;font-weight:bold;font-size:11px;\'>PAM</div>'">
      <div class="cp-head-info">
        <h3 style="margin:0;font-size:14px">المساعد الذكي <span class="cp-online"></span></h3>
        <div class="cp-head-sub" id="cpIndexedCount">📚 جاري التحميل...</div>
      </div>
    </div>
    <button id="cpNewChat" onclick="cpNewChat()" title="محادثة جديدة" style="border:none;background:transparent;color:#fff;font-size:13px;cursor:pointer;padding:0 4px;margin-left:4px">🔄</button>
    <button class="cp-close" onclick="closeChatPanel()" title="إغلاق">×</button>
  </div>
  <div class="cp-sugs" id="cpSuggestions">
    <button class="cp-sug" onclick="cpSend('ما هي الوثائق المتاحة؟')">ما هي الوثائق؟</button>
    <button class="cp-sug" onclick="cpSend('كم عدد العقود؟')">عدد العقود</button>
    <button class="cp-sug" onclick="cpSend('ما إجمالي أوامر الشراء؟')">إجمالي أوامر الشراء</button>
    <button class="cp-sug" onclick="cpSend('ابحث عن قرار معين')">ابحث عن قرار</button>
  </div>
  <div class="cp-msgs" id="cpMessages"></div>
  <div class="cp-foot">
    <input id="cpInput" class="cp-input" type="text" placeholder="اكتب سؤالك هنا...">
    <button class="cp-send" onclick="cpSend()">إرسال</button>
  </div>
</div>
<div id="cpTab" class="cp-tab" onclick="openChatPanel()" title="المساعد الذكي">🤖 المساعد الذكي</div>

<script>
(() => {
  const CP_KEY = 'cp_msgs_v1';
  let cpMsgs = [], cpWelcomed = false;
  try { cpMsgs = JSON.parse(sessionStorage.getItem(CP_KEY) || '[]'); cpWelcomed = cpMsgs.length > 0; } catch {}
  // In-memory conversation history for multi-turn context (cleared on page refresh)
  let cpConversationHistory = [];

  const CP_NO_ANSWER_PHRASES = [
    'عذراً، لم أجد', 'Sorry, I could not find',
    'لا تتوفر', 'لم أتمكن', 'لا توجد معلومات'
  ];
  function cpIsNoAnswer(text) {
    return CP_NO_ANSWER_PHRASES.some(p => (text||'').includes(p));
  }
  function formatMessage(text) {
    if (!text) return '';
    let formatted = text;

    // ── LaTeX: $$...$$ blocks ──────────────────────────────────────────────
    formatted = formatted.replace(/\$\$([\s\S]*?)\$\$/g, (_, expr) => {
      const readable = expr
        .replace(/\\frac\{([^}]+)\}\{([^}]+)\}/g, '$1 ÷ $2')
        .replace(/\\times/g, '×')
        .replace(/\\text\{([^}]+)\}/g, '$1')
        .replace(/\\textbf\{([^}]+)\}/g, '<strong>$1</strong>')
        .replace(/\\_/g, '_').replace(/[{}]/g, '').trim();
      return `<span style="font-family:monospace;background:#f0f4ff;padding:2px 6px;border-radius:4px">${readable}</span>`;
    });
    // ── LaTeX: $...$ inline ────────────────────────────────────────────────
    formatted = formatted.replace(/\$([^$\n]+)\$/g, (_, expr) => {
      const readable = expr
        .replace(/\\frac\{([^}]+)\}\{([^}]+)\}/g, '$1 ÷ $2')
        .replace(/\\times/g, '×')
        .replace(/\\text\{([^}]+)\}/g, '$1')
        .replace(/[{}]/g, '').trim();
      return `<span style="font-family:monospace">${readable}</span>`;
    });
    // ── Remove remaining LaTeX commands ───────────────────────────────────
    formatted = formatted
      .replace(/\\[a-zA-Z]+\{([^}]*)\}/g, '$1')
      .replace(/\\[a-zA-Z]+/g, '')
      .replace(/\\\\/g, '<br>');

    // ── Standard markdown ──────────────────────────────────────────────────
    formatted = formatted
      .replace(/```([\s\S]*?)```/g,
        '<div style="background:#f7fafc;border:1px solid #e2e8f0;border-radius:6px;padding:10px;margin:6px 0;font-family:monospace;font-size:13px;direction:ltr;text-align:left">$1</div>')
      .replace(/^### (.*)/gm, '<h4 style="margin:4px 0;color:#1a2f4e;font-size:14px">$1</h4>')
      .replace(/^## (.*)/gm,  '<h3 style="margin:6px 0;color:#1a2f4e;font-size:15px">$1</h3>')
      .replace(/^# (.*)/gm,   '<h2 style="margin:6px 0;color:#1a2f4e;font-size:16px">$1</h2>')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/^> (.*)/gm,
        '<div style="border-right:3px solid #c9a84c;padding:4px 10px;margin:4px 0;background:#fffdf0;border-radius:4px">$1</div>')
      .replace(/^---$/gm, '<hr style="border:none;border-top:1px solid #e2e8f0;margin:6px 0">')
      .replace(/^[•\-\*] (.*)/gm, '<div style="padding:1px 0 1px 15px">• $1</div>')
      .replace(/^\d+\. (.*)/gm, (m, p1) => {
        const n = m.match(/^(\d+)/)[1];
        return `<div style="padding:1px 0 1px 5px">${n}. ${p1}</div>`;
      });

    // ── Markdown tables (header | separator | rows) ────────────────────────
    const tableRegex = /(\|.+\|\n)([\|\-\s:]+\|\n)((?:\|.+\|\n?)*)/gm;
    formatted = formatted.replace(tableRegex, (_, header, _sep, rows) => {
      const hCells = header.split('|').filter(c => c.trim());
      const headHTML = hCells.map(c =>
        `<th style="padding:6px 10px;background:#1a2f4e;color:white;font-size:13px;text-align:center">${c.trim()}</th>`
      ).join('');
      const rowsHTML = rows.trim().split('\n').map(row => {
        const cells = row.split('|').filter(c => c.trim());
        return '<tr>' + cells.map(c =>
          `<td style="padding:6px 10px;border:1px solid #e2e8f0;font-size:13px;text-align:center">${c.trim()}</td>`
        ).join('') + '</tr>';
      }).join('');
      return `<table style="width:100%;border-collapse:collapse;margin:6px 0">${headHTML ? '<thead><tr>' + headHTML + '</tr></thead>' : ''}<tbody>${rowsHTML}</tbody></table>`;
    });

    // ── Line breaks ────────────────────────────────────────────────────────
    formatted = formatted
      .replace(/\n{3,}/g, '\n\n')
      .replace(/\n\n/g, '<br>')
      .replace(/\n/g, ' ');

    return formatted;
  }
  function cpBuildSourceCards(sources, lang, answerText) {
    if (cpIsNoAnswer(answerText)) return null;
    if (!sources || !sources.length) return null;
    const validSrcs = sources.filter(s => s.file_id && s.view_url && (s.filename || s.decree_number));
    if (!validSrcs.length) return null;
    const isAr = (lang || 'ar') === 'ar';
    const tooltip = isAr ? 'اضغط لفتح المستند' : 'Click to open document';
    const label = isAr ? '📚 المصادر:' : '📚 Sources:';
    const wrap = document.createElement('div');
    wrap.className = 'src-cards';
    const lbl = document.createElement('div');
    lbl.className = 'src-cards-label';
    lbl.textContent = label;
    wrap.appendChild(lbl);
    validSrcs.forEach(s => {
      const card = document.createElement('div');
      card.className = 'src-card';
      card.setAttribute('data-tooltip', tooltip);
      card.onclick = () => window.open(s.view_url, '_blank');
      const metaParts = [];
      if (s.decree_number) metaParts.push(isAr ? `قرار رقم ${s.decree_number}` : `Decree ${s.decree_number}`);
      if (s.year) metaParts.push(s.year);
      if (s.department) metaParts.push(s.department);
      const displayName = (s.filename || '').replace(/\.pdf$/i, '') || (isAr ? `قرار رقم ${s.decree_number}` : `Decree ${s.decree_number}`);
      card.innerHTML = `<div class="src-card-inner">
        <div class="src-card-icon">📄</div>
        <div class="src-card-info">
          <div class="src-card-name" title="${displayName.replace(/"/g,'&quot;')}">${displayName}</div>
          <div class="src-card-meta">${metaParts.join(' | ')}</div>
        </div>
        <div class="src-card-arrow">↗️</div>
      </div>`;
      wrap.appendChild(card);
    });
    return wrap;
  }

  function cpSave() { sessionStorage.setItem(CP_KEY, JSON.stringify(cpMsgs)); }

  function cpRender() {
    const c = document.getElementById('cpMessages'); if (!c) return;
    c.innerHTML = '';
    cpMsgs.forEach(m => cpAppendEl(m, c));
    c.scrollTop = c.scrollHeight;
  }

  function cpAppendEl(m, c) {
    c = c || document.getElementById('cpMessages'); if (!c) return;
    const d = document.createElement('div');
    d.className = 'cp-msg ' + (m.role === 'user' ? 'cp-user' : 'cp-bot') + (m.viol ? ' cp-viol' : '');
    if (m.role === 'user') { d.textContent = m.text; } else { d.innerHTML = formatMessage(m.text); }
    const curLang = (typeof LangManager !== 'undefined') ? LangManager.current : (localStorage.getItem('language') || 'ar');
    if (m.sources && m.sources.length && !cpIsNoAnswer(m.text)) {
      const cards = cpBuildSourceCards(m.sources, curLang, m.text || '');
      if (cards) d.appendChild(cards);
    } else if (m.show_source && m.src_label && !cpIsNoAnswer(m.text)) {
      const s = document.createElement('div'); s.className = 'cp-src'; s.textContent = m.src_label;
      d.appendChild(document.createElement('br')); d.appendChild(s);
    }
    c.appendChild(d); c.scrollTop = c.scrollHeight;
  }

  function cpTyping(on) {
    const c = document.getElementById('cpMessages'); if (!c) return;
    const ex = document.getElementById('cpTypingEl');
    if (on && !ex) {
      const t = document.createElement('div'); t.id = 'cpTypingEl'; t.className = 'cp-msg cp-bot';
      t.innerHTML = '<span class="cp-typing-wrap"><i></i><i></i><i></i></span>';
      c.appendChild(t); c.scrollTop = c.scrollHeight;
    }
    if (!on && ex) ex.remove();
  }

  function cpGetSessionId() {
    let sid = sessionStorage.getItem('chat_session_id');
    if (!sid) { sid = 'sess_' + Math.random().toString(36).slice(2,12); sessionStorage.setItem('chat_session_id', sid); }
    return sid;
  }

  window.cpSend = async function(override) {
    const inp = document.getElementById('cpInput');
    const q = (override || (inp ? inp.value : '')).trim(); if (!q) return;
    if (inp) inp.value = '';
    cpMsgs.push({ role: 'user', text: q }); cpSave(); cpRender(); cpTyping(true);

    const c = document.getElementById('cpMessages');
    const msgEl = document.createElement('div');
    msgEl.className = 'cp-msg cp-bot';
    let fullText = '', finalSource = null, finalSources = [];

    try {
      const resp = await fetch('/api/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Session-ID': cpGetSessionId() },
        body: JSON.stringify({ question: q, conversation_history: cpConversationHistory.slice(-6) }),
      });
      cpTyping(false);
      if (c) { c.appendChild(msgEl); c.scrollTop = c.scrollHeight; }

      const reader = resp.body.getReader();
      const dec = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        const parts = buf.split('\n\n'); buf = parts.pop() || '';
        for (const part of parts) {
          const line = part.trim();
          if (!line.startsWith('data: ')) continue;
          try {
            const data = JSON.parse(line.slice(6));
            if (data.chunk) { fullText += data.chunk; msgEl.innerHTML = formatMessage(fullText); if (c) c.scrollTop = c.scrollHeight; }
            if (data.done) { finalSource = data.source; finalSources = data.sources || []; }
          } catch {}
        }
      }
      // Append clickable source cards (only if answer is not "not found")
      const curLang = (typeof LangManager !== 'undefined') ? LangManager.current : (localStorage.getItem('language') || 'ar');
      if (finalSources.length && !cpIsNoAnswer(fullText)) {
        const cards = cpBuildSourceCards(finalSources, curLang, fullText);
        if (cards) msgEl.appendChild(cards);
      } else if (finalSource?.show_source && finalSource.source_label && !cpIsNoAnswer(fullText)) {
        const s = document.createElement('div'); s.className = 'cp-src'; s.textContent = finalSource.source_label;
        msgEl.appendChild(document.createElement('br')); msgEl.appendChild(s);
      }
      cpMsgs.push({ role: 'bot', text: fullText, sources: finalSources, show_source: !!finalSource?.show_source, src_label: finalSource?.source_label || '', viol: !!finalSource?.contains_violation });
      cpSave();
      // Update in-memory conversation history for multi-turn context
      if (fullText) {
        cpConversationHistory.push({ role: 'user', content: q });
        cpConversationHistory.push({ role: 'assistant', content: fullText });
      }
      // Save to unified history and notify portal
      if (fullText) {
        if (typeof ChatHistory !== 'undefined') ChatHistory.save(q, fullText, finalSource, finalSources);
        document.dispatchEvent(new CustomEvent('chatResponseReceived', { detail: { fileIds: finalSources.map(s=>s.file_id).filter(Boolean) } }));
      }
    } catch (e) {
      cpTyping(false);
      if (c && c.contains(msgEl)) { msgEl.textContent = 'تعذر الاتصال بالخادم.'; }
      else { cpMsgs.push({ role: 'bot', text: 'تعذر الاتصال بالخادم.' }); cpSave(); cpRender(); }
    }
  };

  window.openChatPanel = function() {
    const panel = document.getElementById('cpPanel'), tab = document.getElementById('cpTab');
    if (panel) panel.classList.add('open');
    if (tab) tab.style.display = 'none';
    if (!cpWelcomed) {
      cpMsgs = [{ role: 'bot', text: 'السلام عليكم! 👋 أنا مساعدك الذكي. كيف يمكنني مساعدتك اليوم؟\n\nيمكنني الإجابة على أسئلة عن الوثائق والبيانات المالية.' }];
      cpWelcomed = true; cpSave();
    }
    cpRender();
  };

  window.closeChatPanel = function() {
    const panel = document.getElementById('cpPanel'), tab = document.getElementById('cpTab');
    if (panel) panel.classList.remove('open');
    if (tab) tab.style.display = '';
  };

  window.cpNewChat = function() {
    cpConversationHistory = [];
    cpMsgs = [];
    cpWelcomed = false;
    cpSave();
    cpRender();
  };

  const inp = document.getElementById('cpInput');
  if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter') window.cpSend(); });

  // Hook into polling to update indexed count
  window._cpUpdateCount = function(files) {
    const n = files.filter(f => (f.status || 'ready') === 'ready').length;
    const depts = new Set(files.filter(f => (f.status || 'ready') === 'ready').map(f => f.department_name_ar).filter(Boolean)).size;
    const el = document.getElementById('cpIndexedCount');
    if (el) el.textContent = `📚 ${n} وثيقة في ${depts} إدارة`;
  };

  // Register with the polling system from chat_widget.html
  const origPoll = window._onStatusPoll;
  window._onStatusPoll = function(files) {
    if (origPoll) origPoll(files);
    window._cpUpdateCount && window._cpUpdateCount(files);
  };

  cpRender();
})();
</script>
